name: sync-clients-to-table
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install sshpass + build xray client
        run: |
          sudo apt-get install -y sshpass >/dev/null 2>&1
          cd /tmp
          VER=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep tag_name | head -1 | cut -d'"' -f4)
          curl -sL "https://github.com/XTLS/Xray-core/releases/download/${VER}/Xray-linux-64.zip" -o x.zip
          unzip -o x.zip xray >/dev/null && chmod +x xray
          echo "RUNNER_IP=$(curl -s https://api.ipify.org)" >> $GITHUB_ENV
          # Frankfurt 1.0 config
          cat > cfg_fra.json <<'EOF'
          {"log":{"loglevel":"info"},"inbounds":[{"port":10808,"listen":"127.0.0.1","protocol":"socks","settings":{"udp":true}}],"outbounds":[{"protocol":"vless","settings":{"vnext":[{"address":"77.110.100.210","port":443,"users":[{"id":"fe54c7f1-7a12-44f6-9956-f0578a87fd2f","encryption":"none","flow":""}]}]},"streamSettings":{"network":"tcp","security":"reality","realitySettings":{"serverName":"vk.com","fingerprint":"chrome","publicKey":"Q_wpt7L8sU2O1OVBV-mpsSvgLAChIhN4hgTm0XZH4Do","shortId":"a1b2c3d4e5f6","spiderX":"/"}}}]}
          EOF
          # LA 1.0 config
          cat > cfg_la.json <<'EOF'
          {"log":{"loglevel":"info"},"inbounds":[{"port":10809,"listen":"127.0.0.1","protocol":"socks","settings":{"udp":true}}],"outbounds":[{"protocol":"vless","settings":{"vnext":[{"address":"216.227.169.120","port":443,"users":[{"id":"fe54c7f1-7a12-44f6-9956-f0578a87fd2f","encryption":"none","flow":""}]}]},"streamSettings":{"network":"tcp","security":"reality","realitySettings":{"serverName":"vk.com","fingerprint":"chrome","publicKey":"cBbhJrcUvRo_MDNq6aaUSDLSBvVOqCTEUD7jpAy1O08","shortId":"1f94","spiderX":"/"}}}]}
          EOF
          sed -i 's/^          //' cfg_fra.json cfg_la.json

      - name: Pre-test connectivity (before sync)
        run: |
          set +e
          cd /tmp
          ./xray run -config cfg_fra.json &> fra_pre.log &
          ./xray run -config cfg_la.json &> la_pre.log &
          sleep 5
          echo "=== PRE-TEST Frankfurt (expect FAIL — no exit IP) ==="
          FRA_IP=$(curl -s --max-time 15 --socks5-hostname 127.0.0.1:10808 https://api.ipify.org)
          echo "Frankfurt exit IP: '${FRA_IP}'"
          echo "=== PRE-TEST LA (expect FAIL — no exit IP) ==="
          LA_IP=$(curl -s --max-time 15 --socks5-hostname 127.0.0.1:10809 https://api.ipify.org)
          echo "LA exit IP: '${LA_IP}'"
          kill %1 %2 2>/dev/null; sleep 1

      - name: Sync Frankfurt (v3.2.8)
        env:
          FRANKFURT_PASS: ${{ secrets.FRANKFURT_SSH_PASS }}
        run: |
          SCRIPT_B64=$(base64 -w0 backend/scripts/sync_clients_table.py)
          echo "=== Syncing Frankfurt ==="
          sshpass -p "$FRANKFURT_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "echo $SCRIPT_B64 | base64 -d | python3" 2>&1
          echo "=== Restarting x-ui on Frankfurt ==="
          sshpass -p "$FRANKFURT_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "x-ui restart" 2>&1
          echo "Frankfurt sync done, waiting 5s for xray to settle..."
          sleep 5

      - name: Sync LA (v3.2.8)
        env:
          LA_KEY: ${{ secrets.LA_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$LA_KEY" > ~/.ssh/la-key; chmod 600 ~/.ssh/la-key
          SCRIPT_B64=$(base64 -w0 backend/scripts/sync_clients_table.py)
          echo "=== Syncing LA ==="
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "echo $SCRIPT_B64 | base64 -d | sudo python3" 2>&1
          echo "=== Restarting x-ui on LA ==="
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "sudo x-ui restart" 2>&1
          echo "LA sync done, waiting 5s for xray to settle..."
          sleep 5

      - name: Sync Helsinki (check if clients table exists)
        env:
          HELSINKI_PASS: ${{ secrets.HELSINKI_SSH_PASS }}
        run: |
          echo "=== Checking Helsinki for clients table ==="
          HAS_TABLE=$(sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "python3 -c \"import sqlite3; c=sqlite3.connect('/etc/x-ui/x-ui.db').cursor(); c.execute(\\\"SELECT name FROM sqlite_master WHERE type='table' AND name='clients'\\\"); print(c.fetchone() is not None)\"" 2>&1)
          echo "Helsinki has clients table: $HAS_TABLE"
          if echo "$HAS_TABLE" | grep -q "True"; then
            SCRIPT_B64=$(base64 -w0 backend/scripts/sync_clients_table.py)
            echo "=== Syncing Helsinki ==="
            sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "echo $SCRIPT_B64 | base64 -d | python3" 2>&1
            echo "=== Restarting x-ui on Helsinki ==="
            sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "x-ui restart" 2>&1
            echo "Helsinki sync done"
          else
            echo "Helsinki (v2.9.4) — no clients table, uses inbounds.settings JSON directly. SKIP."
          fi

      - name: Post-test connectivity (after sync)
        run: |
          set +e
          cd /tmp
          ./xray run -config cfg_fra.json &> fra_post.log &
          ./xray run -config cfg_la.json &> la_post.log &
          sleep 5
          echo ""
          echo "========================================"
          echo "=== POST-TEST: Frankfurt (expect 77.110.100.210) ==="
          echo "========================================"
          FRA_IP=$(curl -s --max-time 20 --socks5-hostname 127.0.0.1:10808 https://api.ipify.org)
          echo "Frankfurt exit IP: '${FRA_IP}'"
          grep -E "tunneling|failed|rejected|invalid" fra_post.log | tail -5
          echo ""
          echo "========================================"
          echo "=== POST-TEST: LA (expect 216.227.169.120) ==="
          echo "========================================"
          LA_IP=$(curl -s --max-time 20 --socks5-hostname 127.0.0.1:10809 https://api.ipify.org)
          echo "LA exit IP: '${LA_IP}'"
          grep -E "tunneling|failed|rejected|invalid" la_post.log | tail -5
          echo ""
          echo "========================================"
          if [ "$FRA_IP" = "77.110.100.210" ] && [ "$LA_IP" = "216.227.169.120" ]; then
            echo "✅ BOTH SERVERS WORKING — VPN CONNECTIVITY RESTORED"
          elif [ "$FRA_IP" = "77.110.100.210" ]; then
            echo "⚠️ Frankfurt OK, LA FAILED"
          elif [ "$LA_IP" = "216.227.169.120" ]; then
            echo "⚠️ LA OK, Frankfurt FAILED"
          else
            echo "❌ BOTH SERVERS FAILED — sync did not fix the issue"
          fi
          kill %1 %2 2>/dev/null
