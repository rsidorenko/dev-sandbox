name: prod-vpn-diag
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Query vpn_servers + bot logs
        env:
          SERVER_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && printf '%s\n' "$SERVER_KEY" > ~/.ssh/server-key && chmod 600 ~/.ssh/server-key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/server-key root@109.120.178.49 '
            echo "=== Containers ==="
            docker ps --format "{{.Names}} {{.Image}}"
            BACKEND=$(docker ps --format "{{.Names}}" | grep -v nginx | head -1)
            echo "Backend: $BACKEND"
            echo "=== vpn_servers ==="
            docker exec $BACKEND python3 -c "
import asyncio,asyncpg,os
async def m():
 p=await asyncpg.create_pool(os.environ[\"DATABASE_URL\"])
 r=await p.fetch(\"SELECT id,server_host,inbound_id,COALESCE(transport_type,chr(116)+chr(99)+chr(112))as tt,is_active,label FROM vpn_servers ORDER BY id\")
 for x in r:print(f\"  {x[\"id\"]}|{x[\"server_host\"]}|{x[\"inbound_id\"]}|{x[\"tt\"]}|{x[\"is_active\"]}|{x[\"label\"]}\")
 print(f\"Active: {len([x for x in r if x[\"is_active\"]]}/{len(r)}\")
 await p.close()
asyncio.run(m())" 2>&1
            echo "=== Bot logs ==="
            docker logs --tail 300 $BACKEND 2>&1 | grep -iE "resolve|exception|NOT_FOUND|UNAVAIL|csrf|401|403|error|failed|getClient|uuid.*None|panel.*http" | tail -30
          ' 2>&1 || echo "SSH FAILED"
