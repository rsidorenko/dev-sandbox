name: lte-test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "=== Reachability test from GitHub runner (EU/US) ==="
          echo "TCP connect 46.21.246.115:443:"
          timeout 10 bash -c 'echo > /dev/tcp/46.21.246.115/443' 2>&1 && echo "REACHABLE" || echo "UNREACHABLE"
          echo ""
          echo "TLS handshake with SNI eh.vk.com:"
          timeout 10 openssl s_client -connect 46.21.246.115:443 -servername eh.vk.com </dev/null 2>&1 | head -20
          echo ""
          echo "TCP connect ru.techno-channel.ru:443 (CDN):"
          timeout 10 bash -c 'echo > /dev/tcp/ru.techno-channel.ru/443' 2>&1 && echo "REACHABLE" || echo "UNREACHABLE"
