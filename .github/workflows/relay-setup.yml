name: relay-setup

# Operator workflow for VPN panel / issuance operations that need prod SSH or
# the prod container. Kept separate from deploy.yml so deploy stays untouched.
# Runs scripts from the PRODUCTION host (/opt/bravada): the appleboy/ssh-action
# lands on prod and from there SSHes/scps to the VPN panels; container tasks run
# via `docker compose exec backend`.
#
# Secrets used: SERVER_HOST/SERVER_USER/SERVER_SSH_KEY (prod), HELSINKI_SSH_PASS,
# FRANKFURT_SSH_PASS, LA_SSH_KEY, LTE_SSH_KEY, RELAY_SSH_KEY, RELAY_PANEL_PASS,
# FIELD_ENCRYPTION_KEY.

on:
  workflow_dispatch:
    inputs:
      relay_diag:
        description: "SSH to RU relay (89.169.139.153): dump routing/outbounds, xray status, settings.clients + client_inbounds counts, access log"
        required: false
        default: "false"
      bot_logs:
        description: "Dump bot container logs (reconcile/xui/relay provisioning)"
        required: false
        default: "false"
      port_check:
        description: "From prod, test TCP reachability to relay ports + Helsinki panel TLS verify"
        required: false
        default: "false"
      grant_sub:
        description: "Operator: analyze subscription state for grant_telegram_id (read-only). Set grant_apply=true to actually grant"
        required: false
        default: "false"
      grant_apply:
        description: "With grant_sub=true OR grant_all_expired=true: actually GRANT (activate + ledger fact + UC-05 apply + keys)"
        required: false
        default: "false"
      grant_telegram_id:
        description: "Telegram user id to analyze/grant (e.g. 8158783115)"
        required: false
        default: ""
      grant_plan:
        description: "plan_id to grant (default 1m = 1 month; price from code app.domain.plans)"
        required: false
        default: "1m"
      grant_all_expired:
        description: "Operator: GRANT grant_plan to EVERY expired user whose keys are not yet purged (keys_deleted_at IS NULL). Dry-run without grant_apply=true"
        required: false
        default: "false"
      cleanup_grant:
        description: "Operator: dry-run — list grant ledger facts for grant_telegram_id and show which duplicate(s) would be removed"
        required: false
        default: "false"
      cleanup_apply:
        description: "With cleanup_grant=true: actually DELETE the older duplicate grant fact(s) + their apply/audit rows"
        required: false
        default: "false"
      server_coverage:
        description: "READ-ONLY: dump all vpn_servers + per active server how many users are MISSING from its panel JSON (why a server is hidden from /sub/)"
        required: false
        default: "false"
      sync_tables:
        description: "Mirror inbounds.settings.clients JSON -> v3 clients/client_inbounds table on ALL 5 panels + restart x-ui. Fixes '8 vs 10 keys'. Idempotent"
        required: false
        default: "false"
      upgrade_panel:
        description: "Upgrade one 3x-ui panel to latest in place: helsinki | frankfurt | la | lte (backup DB -> official installer -> verify -> rollback on fail)"
        required: false
        default: ""
      upgrade_dry:
        description: "With upgrade_panel set: snapshot + version check only, NO upgrade"
        required: false
        default: "false"

concurrency:
  group: relay-setup
  cancel-in-progress: false

jobs:
  relay:
    name: Operator panel/issuance task
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run on production host
        uses: appleboy/ssh-action@v1
        env:
          RELAY_DIAG: ${{ github.event.inputs.relay_diag || 'false' }}
          BOT_LOGS: ${{ github.event.inputs.bot_logs || 'false' }}
          PORT_CHECK: ${{ github.event.inputs.port_check || 'false' }}
          GRANT_SUB: ${{ github.event.inputs.grant_sub || 'false' }}
          GRANT_APPLY: ${{ github.event.inputs.grant_apply || 'false' }}
          GRANT_TELEGRAM_ID: ${{ github.event.inputs.grant_telegram_id || '' }}
          GRANT_PLAN: ${{ github.event.inputs.grant_plan || '1m' }}
          GRANT_ALL_EXPIRED: ${{ github.event.inputs.grant_all_expired || 'false' }}
          CLEANUP_GRANT: ${{ github.event.inputs.cleanup_grant || 'false' }}
          CLEANUP_APPLY: ${{ github.event.inputs.cleanup_apply || 'false' }}
          SERVER_COVERAGE: ${{ github.event.inputs.server_coverage || 'false' }}
          SYNC_TABLES: ${{ github.event.inputs.sync_tables || 'false' }}
          UPGRADE_PANEL: ${{ github.event.inputs.upgrade_panel || '' }}
          UPGRADE_DRY: ${{ github.event.inputs.upgrade_dry || 'false' }}
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          RELAY_PANEL_PASS: ${{ secrets.RELAY_PANEL_PASS }}
          HELSINKI_SSH_PASS: ${{ secrets.HELSINKI_SSH_PASS }}
          FRANKFURT_SSH_PASS: ${{ secrets.FRANKFURT_SSH_PASS }}
          LA_SSH_KEY: ${{ secrets.LA_SSH_KEY }}
          LTE_SSH_KEY: ${{ secrets.LTE_SSH_KEY }}
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: RELAY_DIAG,BOT_LOGS,PORT_CHECK,GRANT_SUB,GRANT_APPLY,GRANT_TELEGRAM_ID,GRANT_PLAN,GRANT_ALL_EXPIRED,CLEANUP_GRANT,CLEANUP_APPLY,SERVER_COVERAGE,SYNC_TABLES,UPGRADE_PANEL,UPGRADE_DRY,RELAY_SSH_KEY,RELAY_PANEL_PASS,HELSINKI_SSH_PASS,FRANKFURT_SSH_PASS,LA_SSH_KEY,LTE_SSH_KEY,FIELD_ENCRYPTION_KEY
          script: |
            set -e
            cd /opt/bravada
            RELAY="89.169.139.153"

            if [ "$RELAY_DIAG" = "true" ]; then
              echo "=== RELAY DIAG (relay_probe) on $RELAY ==="
              mkdir -p ~/.ssh
              printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/yandex-relay
              chmod 600 ~/.ssh/yandex-relay
              scp -o StrictHostKeyChecking=no -i ~/.ssh/yandex-relay backend/scripts/relay_probe.py romtan@${RELAY}:/tmp/relay_probe.py 2>&1 || true
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/yandex-relay romtan@${RELAY} "sudo python3 /tmp/relay_probe.py; rm -f /tmp/relay_probe.py" 2>&1 || true
              rm -f ~/.ssh/yandex-relay
              echo "=== RELAY DIAG COMPLETE ==="
            fi

            if [ "$BOT_LOGS" = "true" ]; then
              echo "=== BOT LOGS (reconcile / xui / relay provisioning) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml logs --tail=400 backend 2>&1 | grep -iE "reconcile|xui|89\.169|server.?11|add_client|panel|login|no active|UNAVAILABLE" | tail -70 || true
              echo "=== BOT LOGS COMPLETE ==="
            fi

            if [ "$PORT_CHECK" = "true" ]; then
              echo "=== PROD -> 89.169.139.153 port reachability ==="
              for p in 22 443 1864 2053; do
                timeout 5 bash -c "echo > /dev/tcp/89.169.139.153/$p" 2>/dev/null && echo "  :$p REACHABLE" || echo "  :$p UNREACHABLE"
              done
              echo "--- curl relay panel :1864 (https, verify on) ---"
              curl --max-time 8 https://89.169.139.153:1864/ -o /dev/null -w "  relay https verify http_code=%{http_code}\n" 2>&1 || echo "  relay https verify FAILED (HTTP panel or cert)"
              echo "--- curl Helsinki panel :2053 (https, verify on) — does the bot's verify pass? ---"
              curl --max-time 8 https://77.221.159.106:2053/NrCRLHCbX0W1MCVmEH/ -o /dev/null -w "  helsinki https verify http_code=%{http_code}\n" 2>&1 || echo "  helsinki https verify FAILED (self-signed/untrusted -> bot must skip verify)"
              echo "=== PORT CHECK COMPLETE ==="
            fi

            if [ "$GRANT_SUB" = "true" ] && [ -n "$GRANT_TELEGRAM_ID" ]; then
              echo "=== GRANT SUBSCRIPTION (telegram_id=$GRANT_TELEGRAM_ID plan=$GRANT_PLAN apply=$GRANT_APPLY) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/grant_subscription.py backend:/tmp/grant_subscription.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml cp backend/scripts/rebuild_panel_clients.py backend:/tmp/rebuild_panel_clients.py 2>/dev/null || true
              if [ "$GRANT_APPLY" = "true" ]; then
                docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/grant_subscription.py --telegram-id "$GRANT_TELEGRAM_ID" --grant --plan "$GRANT_PLAN" 2>&1
              else
                echo "--- ANALYZE ONLY (read-only) ---"
                docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/grant_subscription.py --telegram-id "$GRANT_TELEGRAM_ID" 2>&1
              fi
              echo "=== GRANT SUBSCRIPTION COMPLETE ==="
            fi

            if [ "$GRANT_ALL_EXPIRED" = "true" ]; then
              echo "=== GRANT ALL EXPIRED (plan=$GRANT_PLAN apply=$GRANT_APPLY) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/grant_subscription.py backend:/tmp/grant_subscription.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml cp backend/scripts/rebuild_panel_clients.py backend:/tmp/rebuild_panel_clients.py 2>/dev/null || true
              if [ "$GRANT_APPLY" = "true" ]; then
                docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/grant_subscription.py --all-expired --grant --plan "$GRANT_PLAN" 2>&1
              else
                echo "--- DRY RUN (list expired-with-keys only) ---"
                docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/grant_subscription.py --all-expired 2>&1
              fi
              echo "=== GRANT ALL EXPIRED COMPLETE ==="
            fi

            if [ "$CLEANUP_GRANT" = "true" ] && [ -n "$GRANT_TELEGRAM_ID" ]; then
              echo "=== CLEANUP DUPLICATE GRANT (telegram_id=$GRANT_TELEGRAM_ID apply=$CLEANUP_APPLY) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/cleanup_duplicate_grant.py backend:/tmp/cleanup_duplicate_grant.py 2>/dev/null || true
              if [ "$CLEANUP_APPLY" = "true" ]; then
                docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/cleanup_duplicate_grant.py --telegram-id "$GRANT_TELEGRAM_ID" --apply 2>&1
              else
                echo "--- DRY RUN ---"
                docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/cleanup_duplicate_grant.py --telegram-id "$GRANT_TELEGRAM_ID" 2>&1
              fi
              echo "=== CLEANUP COMPLETE ==="
            fi

            if [ "$SERVER_COVERAGE" = "true" ]; then
              echo "=== SERVER COVERAGE (read-only: which users are missing from each server's panel JSON) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/diag_server_coverage.py backend:/tmp/dsc.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml cp backend/scripts/rebuild_panel_clients.py backend:/tmp/rebuild_panel_clients.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/dsc.py 2>&1
              echo "=== SERVER COVERAGE COMPLETE ==="
            fi

            if [ "$SYNC_TABLES" = "true" ]; then
              echo "=== SYNC clients table (JSON -> v3 clients/client_inbounds) on ALL 5 panels ==="
              cd /opt/bravada
              SCRIPT_B64=$(base64 -w0 backend/scripts/sync_clients_table.py)
              # $1=host $2=user $3=ident-or-__pass__ $4=pass
              sync_one() {
                echo "--- $1 ---"
                if [ "$3" = "__pass__" ]; then
                  sshpass -p "$4" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 "$2@$1" "echo $SCRIPT_B64 | base64 -d | python3; echo '--- restart x-ui ---'; x-ui restart 2>/dev/null || systemctl restart x-ui; sleep 5; pgrep -f xray >/dev/null && echo 'xray OK' || echo 'xray NOT running'" 2>&1 || echo "  $1 FAILED"
                else
                  ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i "$3" "$2@$1" "echo $SCRIPT_B64 | base64 -d | sudo python3; echo '--- restart x-ui ---'; sudo x-ui restart 2>/dev/null || sudo systemctl restart x-ui; sleep 5; pgrep -f xray >/dev/null && echo 'xray OK' || echo 'xray NOT running'" 2>&1 || echo "  $1 FAILED"
                fi
              }
              sync_one "77.221.159.106" "root" "__pass__" "$HELSINKI_SSH_PASS"
              sync_one "77.110.100.210" "root" "__pass__" "$FRANKFURT_SSH_PASS"
              mkdir -p ~/.ssh
              printf '%s\n' "$LA_SSH_KEY" > ~/.ssh/la-key; chmod 600 ~/.ssh/la-key
              sync_one "216.227.169.120" "romtan" "$HOME/.ssh/la-key"
              printf '%s\n' "$LTE_SSH_KEY" > ~/.ssh/yandex-cloud; chmod 600 ~/.ssh/yandex-cloud
              sync_one "62.84.118.140" "romtan" "$HOME/.ssh/yandex-cloud"
              printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/yandex-relay; chmod 600 ~/.ssh/yandex-relay
              sync_one "89.169.139.153" "romtan" "$HOME/.ssh/yandex-relay"
              rm -f ~/.ssh/la-key ~/.ssh/yandex-cloud ~/.ssh/yandex-relay
              echo "=== SYNC TABLES COMPLETE ==="
            fi

            if [ -n "$UPGRADE_PANEL" ]; then
              echo "=== UPGRADE PANEL ($UPGRADE_PANEL dry=$UPGRADE_DRY) ==="
              cd /opt/bravada
              SCRIPT_B64=$(base64 -w0 backend/scripts/upgrade_panel.py)
              if [ "$UPGRADE_DRY" = "true" ]; then DRYARG="--dry"; else DRYARG=""; fi
              # $1=host $2=user $3=ident-or-__pass__ $4=pass
              upgrade_panel() {
                echo "--- $1 ---"
                if [ "$3" = "__pass__" ]; then
                  sshpass -p "$4" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 "$2@$1" "echo $SCRIPT_B64 | base64 -d | python3 - $DRYARG" 2>&1 || echo "  $1 FAILED"
                else
                  ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i "$3" "$2@$1" "echo $SCRIPT_B64 | base64 -d | sudo python3 - $DRYARG" 2>&1 || echo "  $1 FAILED"
                fi
              }
              case "$UPGRADE_PANEL" in
                helsinki)
                  upgrade_panel "77.221.159.106" "root" "__pass__" "$HELSINKI_SSH_PASS" ;;
                frankfurt)
                  upgrade_panel "77.110.100.210" "root" "__pass__" "$FRANKFURT_SSH_PASS" ;;
                la)
                  mkdir -p ~/.ssh
                  printf '%s\n' "$LA_SSH_KEY" > ~/.ssh/la-key; chmod 600 ~/.ssh/la-key
                  upgrade_panel "216.227.169.120" "romtan" "$HOME/.ssh/la-key"
                  rm -f ~/.ssh/la-key ;;
                lte)
                  mkdir -p ~/.ssh
                  printf '%s\n' "$LTE_SSH_KEY" > ~/.ssh/yandex-cloud; chmod 600 ~/.ssh/yandex-cloud
                  upgrade_panel "62.84.118.140" "romtan" "$HOME/.ssh/yandex-cloud"
                  rm -f ~/.ssh/yandex-cloud ;;
                *)
                  echo "  unknown upgrade_panel='$UPGRADE_PANEL' (use helsinki|frankfurt|la|lte)" ;;
              esac
              echo "=== UPGRADE PANEL COMPLETE ==="
            fi
