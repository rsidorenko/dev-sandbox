name: relay-setup

# One-purpose workflow for the RU split-routing relay server (89.169.139.153).
# Kept separate from deploy.yml so deploy.yml and the LTE configuration stay
# untouched (deploy.yml is at the GitHub workflow_dispatch input cap).
#
# Runs the setup/registration scripts from the PRODUCTION host (same pattern as
# deploy.yml's LTE blocks): the ssh-action lands on prod (/opt/bravada, where the
# scripts are deployed), injects RELAY_SSH_KEY, and from there SSHes/scps to the
# relay server. Container tasks (Helsinki registration, vpn_servers row) run via
# `docker compose exec backend`.
#
# Prerequisites:
#   - Secrets: RELAY_SSH_KEY (.ssh/yandex-relay), RELAY_PANEL_PASS,
#     plus the deploy secrets SERVER_HOST/SERVER_USER/SERVER_SSH_KEY/FIELD_ENCRYPTION_KEY.
#   - Scripts deployed: run once after merge (normal push deploy ships them to
#     /opt/bravada/backend/scripts/) before triggering this workflow.
#   - Relay server: TCP 22 open to the prod host IP, TCP 443 open to 0.0.0.0/0.

on:
  workflow_dispatch:
    inputs:
      setup_relay:
        description: "Configure RU relay: install 3x-ui if needed, Reality inbound 443, split routing (.ru/.su/.рф/geosite:ru/geoip:ru -> direct, rest -> Helsinki)"
        required: false
        default: "false"
      add_helsinki_relay:
        description: "Register relay UUID as a client on Helsinki :443 inbound (run after setup_relay)"
        required: false
        default: "false"
      add_relay_row:
        description: "Insert vpn_servers row id=11 for the RU relay (needs relay_pubkey/inbound_id/panel_url below)"
        required: false
        default: "false"
      relay_diag:
        description: "SSH to RU relay: dump routing/outbounds, xray status, logs, Helsinki reachability, geo files"
        required: false
        default: "false"
      relay_pubkey:
        description: "REALITY_PUBKEY from setup_relay output (for add_relay_row)"
        required: false
        default: ""
      relay_inbound_id:
        description: "INBOUND_ID from setup_relay output (for add_relay_row)"
        required: false
        default: ""
      relay_panel_url:
        description: "PANEL_URL from setup_relay output (for add_relay_row)"
        required: false
        default: ""
      bot_logs:
        description: "Dump bot container logs (reconcile/xui/relay) to debug client provisioning"
        required: false
        default: "false"
      port_check:
        description: "From prod, test TCP reachability to 89.169.139.153 :22/:443/:1864 + Helsinki panel TLS verify"
        required: false
        default: "false"
      fix_relay_access:
        description: "On relay: ufw allow 22/443/1864 (host firewall blocks the panel port)"
        required: false
        default: "false"
      relay_panel_http:
        description: "Switch relay panel_url to HTTP (no TLS verify; XUI_VERIFY_SSL=1 blocks self-signed)"
        required: false
        default: "false"
      helsinki_probe:
        description: "Check Helsinki v3 clients table for the relay UUID (does xray recognize it?)"
        required: false
        default: "false"

concurrency:
  group: relay-setup
  cancel-in-progress: false

jobs:
  relay:
    name: RU relay setup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run on production host
        uses: appleboy/ssh-action@v1
        env:
          SETUP_RELAY: ${{ github.event.inputs.setup_relay || 'false' }}
          ADD_HELSINKI_RELAY: ${{ github.event.inputs.add_helsinki_relay || 'false' }}
          ADD_RELAY_ROW: ${{ github.event.inputs.add_relay_row || 'false' }}
          RELAY_DIAG: ${{ github.event.inputs.relay_diag || 'false' }}
          RELAY_PUBKEY: ${{ github.event.inputs.relay_pubkey || '' }}
          RELAY_INBOUND_ID: ${{ github.event.inputs.relay_inbound_id || '' }}
          RELAY_PANEL_URL: ${{ github.event.inputs.relay_panel_url || '' }}
          BOT_LOGS: ${{ github.event.inputs.bot_logs || 'false' }}
          PORT_CHECK: ${{ github.event.inputs.port_check || 'false' }}
          FIX_RELAY_ACCESS: ${{ github.event.inputs.fix_relay_access || 'false' }}
          RELAY_PANEL_HTTP: ${{ github.event.inputs.relay_panel_http || 'false' }}
          HELSINKI_PROBE: ${{ github.event.inputs.helsinki_probe || 'false' }}
          RELAY_SSH_KEY: ${{ secrets.RELAY_SSH_KEY }}
          RELAY_PANEL_PASS: ${{ secrets.RELAY_PANEL_PASS }}
          HELSINKI_SSH_PASS: ${{ secrets.HELSINKI_SSH_PASS }}
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: SETUP_RELAY,ADD_HELSINKI_RELAY,ADD_RELAY_ROW,RELAY_DIAG,RELAY_PUBKEY,RELAY_INBOUND_ID,RELAY_PANEL_URL,BOT_LOGS,PORT_CHECK,FIX_RELAY_ACCESS,RELAY_PANEL_HTTP,HELSINKI_PROBE,RELAY_SSH_KEY,RELAY_PANEL_PASS,HELSINKI_SSH_PASS,FIELD_ENCRYPTION_KEY
          script: |
            set -e
            cd /opt/bravada
            RELAY="89.169.139.153"

            if [ "$SETUP_RELAY" = "true" ]; then
              echo "=== SETUP RELAY on $RELAY ==="
              mkdir -p ~/.ssh
              printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/yandex-relay
              chmod 600 ~/.ssh/yandex-relay
              scp -o StrictHostKeyChecking=no -i ~/.ssh/yandex-relay backend/scripts/setup_relay.py romtan@${RELAY}:/tmp/setup_relay.py 2>&1 || true
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 -i ~/.ssh/yandex-relay romtan@${RELAY} "RELAY_PANEL_PASS='$RELAY_PANEL_PASS' sudo -E python3 /tmp/setup_relay.py; rm -f /tmp/setup_relay.py" 2>&1 || true
              rm -f ~/.ssh/yandex-relay
              echo "=== SETUP RELAY COMPLETE ==="
            fi

            if [ "$ADD_HELSINKI_RELAY" = "true" ]; then
              echo "=== ADD RELAY UUID TO HELSINKI :443 ==="
              docker compose -f docker-compose.prod.yml cp backend/scripts/add_helsinki_relay_client.py backend:/tmp/ahr.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/ahr.py 2>&1
              echo "=== ADD HELSINKI RELAY COMPLETE ==="
            fi

            if [ "$ADD_RELAY_ROW" = "true" ]; then
              echo "=== INSERT vpn_servers ROW id=11 (RU relay) ==="
              docker compose -f docker-compose.prod.yml cp backend/scripts/add_relay_server_row.py backend:/tmp/arr.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL -e RELAY_PUBKEY -e RELAY_INBOUND_ID -e RELAY_PANEL_URL -e RELAY_PANEL_PASS backend python /tmp/arr.py 2>&1
              echo "=== ADD RELAY ROW COMPLETE ==="
            fi

            if [ "$RELAY_PANEL_HTTP" = "true" ]; then
              echo "=== SWITCH RELAY panel_url to HTTP ==="
              docker compose -f docker-compose.prod.yml cp backend/scripts/relay_panel_http.py backend:/tmp/rph.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e DATABASE_URL backend python /tmp/rph.py 2>&1
              echo "=== RELAY PANEL HTTP COMPLETE ==="
            fi

            if [ "$HELSINKI_PROBE" = "true" ]; then
              echo "=== HELSINKI clients table for relay UUID ==="
              sshpass -p "$HELSINKI_SSH_PASS" scp -o StrictHostKeyChecking=no backend/scripts/helsinki_probe.py root@77.221.159.106:/tmp/hp.py 2>&1 || echo "  scp failed"
              sshpass -p "$HELSINKI_SSH_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 'python3 /tmp/hp.py; rm -f /tmp/hp.py' 2>&1 || echo "  Helsinki SSH FAILED (need HELSINKI_SSH_PASS)"
              echo "=== HELSINKI PROBE COMPLETE ==="
            fi

            if [ "$RELAY_DIAG" = "true" ]; then
              echo "=== RELAY DIAG (relay_probe) on $RELAY ==="
              mkdir -p ~/.ssh
              printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/yandex-relay
              chmod 600 ~/.ssh/yandex-relay
              scp -o StrictHostKeyChecking=no -i ~/.ssh/yandex-relay backend/scripts/relay_probe.py romtan@${RELAY}:/tmp/relay_probe.py 2>&1 || true
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/yandex-relay romtan@${RELAY} "sudo python3 /tmp/relay_probe.py; rm -f /tmp/relay_probe.py" 2>&1 || true
              rm -f ~/.ssh/yandex-relay
              echo "=== RELAY DIAG COMPLETE ==="
            fi

            if [ "$BOT_LOGS" = "true" ]; then
              echo "=== BOT LOGS (reconcile / xui / relay provisioning) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml logs --tail=400 backend 2>&1 | grep -iE "reconcile|xui|89\.169|server.?11|add_client|panel|login|no active|UNAVAILABLE" | tail -70 || true
              echo "=== BOT LOGS COMPLETE ==="
            fi

            if [ "$PORT_CHECK" = "true" ]; then
              echo "=== PROD -> 89.169.139.153 port reachability ==="
              for p in 22 443 1864 2053; do
                timeout 5 bash -c "echo > /dev/tcp/89.169.139.153/$p" 2>/dev/null && echo "  :$p REACHABLE" || echo "  :$p UNREACHABLE"
              done
              echo "--- curl relay panel :1864 (https, verify on) ---"
              curl --max-time 8 https://89.169.139.153:1864/ -o /dev/null -w "  relay https verify http_code=%{http_code}\n" 2>&1 || echo "  relay https verify FAILED (HTTP panel or cert)"
              echo "--- curl Helsinki panel :2053 (https, verify on) — does the bot's verify pass? ---"
              curl --max-time 8 https://77.221.159.106:2053/NrCRLHCbX0W1MCVmEH/ -o /dev/null -w "  helsinki https verify http_code=%{http_code}\n" 2>&1 || echo "  helsinki https verify FAILED (self-signed/untrusted -> bot must skip verify)"
              echo "=== PORT CHECK COMPLETE ==="
            fi

            if [ "$FIX_RELAY_ACCESS" = "true" ]; then
              echo "=== FIX RELAY ACCESS: ufw allow 22/443/1864 ==="
              mkdir -p ~/.ssh
              printf '%s\n' "$RELAY_SSH_KEY" > ~/.ssh/yandex-relay
              chmod 600 ~/.ssh/yandex-relay
              scp -o StrictHostKeyChecking=no -i ~/.ssh/yandex-relay backend/scripts/fix_relay_access.py romtan@${RELAY}:/tmp/fra.py 2>&1 || true
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=20 -i ~/.ssh/yandex-relay romtan@${RELAY} "sudo python3 /tmp/fra.py; rm -f /tmp/fra.py" 2>&1 || true
              rm -f ~/.ssh/yandex-relay
              echo "=== FIX RELAY ACCESS COMPLETE ==="
            fi
