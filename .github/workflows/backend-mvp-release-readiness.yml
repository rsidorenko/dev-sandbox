name: backend-mvp-release-readiness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/backend-mvp-release-readiness.yml"
      - "backend/scripts/run_mvp_release_preflight.py"
      - "backend/scripts/run_mvp_final_static_handoff_check.py"
      - "backend/tests/test_vless_key_lifecycle.py"
      - "backend/tests/test_vless_provider.py"
      - "backend/tests/test_payment_fulfillment_ingress.py"
  push:
    branches:
      - "main"
    paths:
      - ".github/workflows/backend-mvp-release-readiness.yml"
      - "backend/scripts/run_mvp_release_preflight.py"
      - "backend/scripts/run_mvp_final_static_handoff_check.py"
      - "backend/tests/test_vless_key_lifecycle.py"
      - "backend/tests/test_vless_provider.py"
      - "backend/tests/test_payment_fulfillment_ingress.py"

jobs:
  mvp-release-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: python -m pip install -e .[test]

      - name: Verify all source modules compile
        run: python -m compileall src/ -q

      - name: Run MVP release preflight contract groups
        run: python scripts/run_mvp_release_preflight.py

      - name: Run final static MVP handoff check
        run: python scripts/run_mvp_final_static_handoff_check.py
