name: upgrade-3xui
on:
  workflow_dispatch:

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass >/dev/null 2>&1

      - name: Backup Frankfurt DB + Upgrade
        env:
          PASS: ${{ secrets.FRANKFURT_SSH_PASS }}
        run: |
          echo "=== Frankfurt: backup + upgrade ==="
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "
            cp /etc/x-ui/x-ui.db /etc/x-ui/x-ui.db.bak.pre-upgrade &&
            echo 'DB backed up' &&
            /usr/local/x-ui/x-ui -v &&
            echo 'Starting upgrade...' &&
            bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/update.sh) &&
            /usr/local/x-ui/x-ui -v &&
            x-ui restart &&
            echo 'Upgrade done'
          " 2>&1

      - name: Backup LA DB + Upgrade
        env:
          LA_KEY: ${{ secrets.LA_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$LA_KEY" > ~/.ssh/la-key; chmod 600 ~/.ssh/la-key
          echo "=== LA: backup + upgrade ==="
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "
            sudo cp /etc/x-ui/x-ui.db /etc/x-ui/x-ui.db.bak.pre-upgrade &&
            echo 'DB backed up' &&
            sudo /usr/local/x-ui/x-ui -v &&
            echo 'Starting upgrade...' &&
            sudo bash <(curl -Ls https://raw.githubusercontent.com/MHSanaei/3x-ui/main/update.sh) &&
            sudo /usr/local/x-ui/x-ui -v &&
            sudo x-ui restart &&
            echo 'Upgrade done'
          " 2>&1

      - name: Verify versions
        env:
          PASS: ${{ secrets.FRANKFURT_SSH_PASS }}
          HELSINKI_PASS: ${{ secrets.HELSINKI_SSH_PASS }}
          LA_KEY: ${{ secrets.LA_SSH_KEY }}
        run: |
          echo "=== Version check ==="
          echo -n "Frankfurt: "
          sshpass -p "$PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "/usr/local/x-ui/x-ui -v" 2>&1

          echo -n "Helsinki: "
          sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "/usr/local/x-ui/x-ui -v" 2>&1

          echo -n "LA: "
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "sudo /usr/local/x-ui/x-ui -v" 2>&1

      - name: Sync clients table on all servers
        env:
          FRANKFURT_PASS: ${{ secrets.FRANKFURT_SSH_PASS }}
          HELSINKI_PASS: ${{ secrets.HELSINKI_SSH_PASS }}
          LA_KEY: ${{ secrets.LA_SSH_KEY }}
        run: |
          SCRIPT_B64=$(base64 -w0 backend/scripts/sync_clients_table.py)

          echo "=== Sync Frankfurt ==="
          sshpass -p "$FRANKFURT_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "echo $SCRIPT_B64 | base64 -d | python3" 2>&1
          sshpass -p "$FRANKFURT_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "x-ui restart" 2>&1

          echo "=== Sync Helsinki ==="
          sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "echo $SCRIPT_B64 | base64 -d | python3" 2>&1
          sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "x-ui restart" 2>&1

          echo "=== Sync LA ==="
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "echo $SCRIPT_B64 | base64 -d | sudo python3" 2>&1
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "sudo x-ui restart" 2>&1

      - name: Fetch Helsinki Reality keys + Build xray configs
        env:
          HELSINKI_PASS: ${{ secrets.HELSINKI_SSH_PASS }}
        run: |
          cd /tmp
          # Get Helsinki inbound Reality settings (pbk, sid, sni)
          HEL_KEYS=$(sshpass -p "$HELSINKI_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.221.159.106 "python3 -c \"
          import sqlite3, json
          db = sqlite3.connect('/etc/x-ui/x-ui.db')
          c = db.cursor()
          c.execute('SELECT settings FROM inbounds WHERE id=1')
          s = json.loads(c.fetchone()[0])
          print(json.dumps(s))
          db.close()
          \"" 2>&1)
          echo "Helsinki inbound 1 settings: ${HEL_KEYS:0:200}..."

          # Extract Reality keys from Helsinki inbound
          HEL_PBK=$(echo "$HEL_KEYS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('realitySettings',{}).get('publicKey','') if 'realitySettings' in d else d.get('stream',{}).get('realitySettings',{}).get('publicKey',''))")
          HEL_SID=$(echo "$HEL_KEYS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('realitySettings',{}).get('shortId','') if 'realitySettings' in d else d.get('stream',{}).get('realitySettings',{}).get('shortId',''))")
          HEL_SNI=$(echo "$HEL_KEYS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('realitySettings',{}).get('serverNames',[''])[0] if 'realitySettings' in d else d.get('stream',{}).get('realitySettings',{}).get('serverNames',[''])[0])")
          echo "Helsinki PBK=$HEL_PBK SID=$HEL_SID SNI=$HEL_SNI"

          VER=$(curl -s https://api.github.com/repos/XTLS/Xray-core/releases/latest | grep tag_name | head -1 | cut -d'"' -f4)
          curl -sL "https://github.com/XTLS/Xray-core/releases/download/${VER}/Xray-linux-64.zip" -o x.zip
          unzip -o x.zip xray >/dev/null && chmod +x xray

          # Frankfurt config
          cat > cfg_fra.json <<EOF
          {"log":{"loglevel":"info"},"inbounds":[{"port":10808,"listen":"127.0.0.1","protocol":"socks","settings":{"udp":true}}],"outbounds":[{"protocol":"vless","settings":{"vnext":[{"address":"77.110.100.210","port":443,"users":[{"id":"fe54c7f1-7a12-44f6-9956-f0578a87fd2f","encryption":"none","flow":""}]}]},"streamSettings":{"network":"tcp","security":"reality","realitySettings":{"serverName":"vk.com","fingerprint":"chrome","publicKey":"Q_wpt7L8sU2O1OVBV-mpsSvgLAChIhN4hgTm0XZH4Do","shortId":"a1b2c3d4e5f6","spiderX":"/"}}}]}
          EOF
          # Helsinki config
          cat > cfg_hel.json <<EOF
          {"log":{"loglevel":"info"},"inbounds":[{"port":10810,"listen":"127.0.0.1","protocol":"socks","settings":{"udp":true}}],"outbounds":[{"protocol":"vless","settings":{"vnext":[{"address":"77.221.159.106","port":443,"users":[{"id":"fe54c7f1-7a12-44f6-9956-f0578a87fd2f","encryption":"none","flow":""}]}]},"streamSettings":{"network":"tcp","security":"reality","realitySettings":{"serverName":"$HEL_SNI","fingerprint":"chrome","publicKey":"$HEL_PBK","shortId":"$HEL_SID","spiderX":"/"}}}]}
          EOF
          # LA config
          cat > cfg_la.json <<EOF
          {"log":{"loglevel":"info"},"inbounds":[{"port":10809,"listen":"127.0.0.1","protocol":"socks","settings":{"udp":true}}],"outbounds":[{"protocol":"vless","settings":{"vnext":[{"address":"216.227.169.120","port":443,"users":[{"id":"fe54c7f1-7a12-44f6-9956-f0578a87fd2f","encryption":"none","flow":""}]}]},"streamSettings":{"network":"tcp","security":"reality","realitySettings":{"serverName":"vk.com","fingerprint":"chrome","publicKey":"cBbhJrcUvRo_MDNq6aaUSDLSBvVOqCTEUD7jpAy1O08","shortId":"1f94","spiderX":"/"}}}]}
          EOF
          sed -i 's/^          //' cfg_fra.json cfg_hel.json cfg_la.json
          echo "Configs built"
          sleep 5

          set +e
          ./xray run -config cfg_fra.json &> fra.log &
          ./xray run -config cfg_hel.json &> hel.log &
          ./xray run -config cfg_la.json &> la.log &
          sleep 5

          echo "========================================"
          FRA=$(curl -s --max-time 20 --socks5-hostname 127.0.0.1:10808 https://api.ipify.org)
          echo "Frankfurt: ${FRA} (expect 77.110.100.210)"
          HEL=$(curl -s --max-time 20 --socks5-hostname 127.0.0.1:10810 https://api.ipify.org)
          echo "Helsinki:  ${HEL} (expect 77.221.159.106)"
          LA=$(curl -s --max-time 20 --socks5-hostname 127.0.0.1:10809 https://api.ipify.org)
          echo "LA:        ${LA} (expect 216.227.169.120)"

          OK=0
          [ "$FRA" = "77.110.100.210" ] && OK=$((OK+1))
          [ "$HEL" = "77.221.159.106" ] && OK=$((OK+1))
          [ "$LA" = "216.227.169.120" ] && OK=$((OK+1))
          echo ""
          echo "${OK}/3 servers working"
          kill %1 %2 %3 2>/dev/null
