            import asyncio, asyncpg, os, sys, re
            sys.path.insert(0, '/app/src')
            from app.security.field_encryption import decrypt_field

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                pool = await asyncpg.create_pool(dsn, min_size=1, max_size=3)
                try:
                    rows = await pool.fetch(
                        "SELECT id, label, panel_url, panel_username, "
                        "COALESCE(encrypted_password, '') AS enc_pwd, panel_password "
                        "FROM vpn_servers WHERE is_active = TRUE ORDER BY id"
                    )
                    import httpx
                    for row in rows:
                        url = row['panel_url'].rstrip('/')
                        pwd = decrypt_field(row['enc_pwd']) if row['enc_pwd'] else row['panel_password']
                        print(f'  [{row["id"]}] {row["label"]}: {url}')
                        try:
                            async with httpx.AsyncClient(verify=False, follow_redirects=True, timeout=10) as client:
                                # Try csrf-token endpoint
                                csrf_resp = await client.get(f'{url}/csrf-token')
                                csrf = ''
                                if csrf_resp.status_code == 200:
                                    d = csrf_resp.json()
                                    csrf = d.get('obj', '') or d.get('token', '')
                                if not csrf:
                                    page = await client.get(f'{url}/')
                                    m = re.search(r'csrf-token.*?content="([^"]+)"', page.text)
                                    csrf = m.group(1) if m else ''
                                hdrs = {'Content-Type': 'application/json'}
                                if csrf:
                                    hdrs['X-CSRF-Token'] = csrf
                                login = await client.post(f'{url}/login',
                                    json={'username': row['panel_username'], 'password': pwd},
                                    headers=hdrs, timeout=10)
                                if login.status_code == 200 and login.json().get('success'):
                                    print(f'    LOGIN OK')
                                else:
                                    print(f'    LOGIN FAILED: status={login.status_code} body={login.text[:200]}')
                        except Exception as e:
                            print(f'    ERROR: {e}')
                finally:
                    await pool.close()

            asyncio.run(main())
            PYEOF
            docker compose -f docker-compose.prod.yml cp /tmp/panel_diag.py backend:/tmp/panel_diag.py 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/panel_diag.py 2>&1 || echo "  Panel diagnostic failed"
