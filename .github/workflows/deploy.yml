name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_hardening:
        description: "Run post-deploy security hardening (migration, encrypt passwords, update .env)"
        required: false
        default: "false"
      run_cleanup:
        description: "Clean all user data and VLESS keys from database (destructive!)"
        required: false
        default: "false"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          RUN_HARDENING: ${{ github.event.inputs.run_hardening || 'false' }}
          RUN_CLEANUP: ${{ github.event.inputs.run_cleanup || 'false' }}
          FIELD_ENCRYPTION_KEY: "aXXXj3z+PJk93aBlp5PmYbyvPNuFpJGlvc4DfMslg9A="
          INTERNAL_API_SECRET: "Mbht2HC-AXBAbX5DQkjWwQinb0GY7JZfxby37o5JPaSjA5iQSj7le2Mu_2WvZiFP"
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: RUN_HARDENING,RUN_CLEANUP,FIELD_ENCRYPTION_KEY,INTERNAL_API_SECRET
          script: |
            set -e
            cd /opt/bravada
            git checkout -- .
            git pull origin main
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
            docker image prune -f
            echo "Deploy complete: $(date)"

            if [ "$RUN_HARDENING" = "true" ]; then
              echo "=== POST-DEPLOY HARDENING ==="

              echo "--- Step 1: Update .env ---"
              cd /opt/bravada/backend
              grep -q "^FIELD_ENCRYPTION_KEY=" .env || echo "FIELD_ENCRYPTION_KEY=" >> .env
              grep -q "^XUI_ENABLED=" .env || echo "XUI_ENABLED=0" >> .env
              grep -q "^XUI_VERIFY_SSL=" .env || echo "XUI_VERIFY_SSL=1" >> .env
              grep -q "^INTERNAL_API_SECRET=" .env || echo "INTERNAL_API_SECRET=" >> .env
              grep -q "^SUBSCRIPTION_BASE_URL=" .env || echo "SUBSCRIPTION_BASE_URL=https://bravada-connect.ru" >> .env

              sed -i "s|^FIELD_ENCRYPTION_KEY=.*|FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}|" .env
              sed -i "s|^XUI_ENABLED=.*|XUI_ENABLED=1|" .env
              sed -i "s|^XUI_VERIFY_SSL=.*|XUI_VERIFY_SSL=1|" .env
              sed -i "s|^INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=${INTERNAL_API_SECRET}|" .env
              sed -i "s|^SUBSCRIPTION_BASE_URL=.*|SUBSCRIPTION_BASE_URL=https://bravada-connect.ru|" .env
              echo "  .env updated"

              echo "--- Step 2: Run migration 029 ---"
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "ALTER TABLE vpn_servers ADD COLUMN IF NOT EXISTS encrypted_password TEXT NOT NULL DEFAULT '';" 2>&1 || echo "  Column already exists"

              echo "--- Step 3: Encrypt panel passwords ---"
              cd /opt/bravada
              cat > /tmp/encrypt_passwords.py << 'PYEOF'
            import asyncio, asyncpg, os, sys
            sys.path.insert(0, '/app/src')
            from app.security.field_encryption import encrypt_field

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                conn = await asyncpg.connect(dsn)
                try:
                    rows = await conn.fetch("SELECT id, panel_password, COALESCE(encrypted_password, '') AS enc FROM vpn_servers")
                    if not rows:
                        print('No vpn_servers found.')
                        return
                    for row in rows:
                        sid = row['id']
                        enc = row['enc']
                        plain = row['panel_password']
                        if enc:
                            print(f'  server {sid}: already encrypted, skipping')
                            continue
                        if not plain:
                            print(f'  server {sid}: empty password, skipping')
                            continue
                        encrypted = encrypt_field(plain)
                        await conn.execute('UPDATE vpn_servers SET encrypted_password = $1 WHERE id = $2', encrypted, sid)
                        print(f'  server {sid}: encrypted')
                    print('Encryption done.')
                finally:
                    await conn.close()

            asyncio.run(main())
            PYEOF
              docker compose -f docker-compose.prod.yml cp /tmp/encrypt_passwords.py backend:/tmp/encrypt_passwords.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY backend python /tmp/encrypt_passwords.py 2>&1 || echo "  Encryption completed or skipped"
              rm -f /tmp/encrypt_passwords.py

              echo "--- Step 4: Restart with new env ---"
              docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
              sleep 10

              echo "--- Step 5: Verify ---"
              docker compose -f docker-compose.prod.yml ps
              sleep 5
              curl -sf http://127.0.0.1:8000/healthz && echo " - backend healthz OK" || echo " - backend healthz FAILED"
              curl -sf http://127.0.0.1:8000/readyz && echo " - backend readyz OK" || echo " - backend readyz FAILED (may need a moment)"
              echo ""
              echo "=== HARDENING COMPLETE ==="
            fi

            if [ "$RUN_CLEANUP" = "true" ]; then
              echo "=== DATABASE CLEANUP ==="
              cd /opt/bravada

              echo "--- Truncating all user data tables ---"
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "TRUNCATE TABLE
                  email_verification_codes,
                  user_emails,
                  referral_transactions,
                  referral_balances,
                  referral_relationships,
                  referral_codes,
                  notification_log,
                  access_reconcile_runs,
                  telegram_update_dedup,
                  adm02_ensure_access_audit_events,
                  issuance_state,
                  billing_subscription_apply_audit_events,
                  billing_subscription_apply_records,
                  billing_ingestion_audit_events,
                  billing_events_ledger,
                  slice1_uc01_outbound_deliveries,
                  idempotency_records,
                  slice1_audit_events,
                  subscription_snapshots,
                  user_identities
                CASCADE;" 2>&1

              echo "--- Deleting all VLESS users from 3x-ui panels ---"
              cd /opt/bravada
              cat > /tmp/clean_vless_users.py << 'PYEOF'
            import asyncio, asyncpg, os, sys, json
            sys.path.insert(0, '/app/src')
            from app.security.field_encryption import decrypt_field

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                conn = await asyncpg.connect(dsn)
                try:
                    rows = await conn.fetch(
                        "SELECT id, panel_url, panel_username, panel_password, "
                        "COALESCE(encrypted_password, '') AS encrypted_password, inbound_id "
                        "FROM vpn_servers WHERE is_active = TRUE"
                    )
                    if not rows:
                        print('No active VPN servers found.')
                        return
                    import httpx
                    for row in rows:
                        panel_url = row['panel_url'].rstrip('/')
                        password = row['encrypted_password'] if row['encrypted_password'] else row['panel_password']
                        if row['encrypted_password']:
                            password = decrypt_field(row['encrypted_password'])
                        inbound_id = row['inbound_id']
                        print(f'  Server {row["id"]}: {panel_url} (inbound {inbound_id})')

                        async with httpx.AsyncClient(verify=False) as client:
                            login = await client.post(f'{panel_url}/login',
                                data={'username': row['panel_username'], 'password': password})
                            if login.status_code != 200 or not login.json().get('success'):
                                print(f'    Login FAILED')
                                continue
                            resp = await client.get(f'{panel_url}/panel/api/inbounds/list')
                            if resp.status_code != 200:
                                print(f'    List inbounds FAILED: {resp.status_code}')
                                continue
                            inbounds = resp.json().get('obj', [])
                            target = None
                            for ib in inbounds:
                                if ib.get('id') == inbound_id:
                                    target = ib
                                    break
                            if not target:
                                print(f'    Inbound {inbound_id} not found')
                                continue
                            settings_str = target.get('settings', '{}')
                            try:
                                settings = json.loads(settings_str)
                            except json.JSONDecodeError:
                                print(f'    Could not parse settings')
                                continue
                            clients = settings.get('clients', [])
                            if not clients:
                                print(f'    No VLESS users on this server.')
                                continue
                            print(f'    Found {len(clients)} VLESS users, deleting...')
                            for c in clients:
                                uuid = c.get('id', '')
                                email = c.get('email', '')
                                del_resp = await client.post(
                                    f'{panel_url}/panel/api/inbounds/{inbound_id}/delClient/{uuid}')
                                status = 'OK' if del_resp.status_code == 200 else f'FAIL({del_resp.status_code})'
                                print(f'      Deleted {email} ({uuid[:8]}...): {status}')
                    print('VLESS cleanup done.')
                finally:
                    await conn.close()

            asyncio.run(main())
            PYEOF
              docker compose -f docker-compose.prod.yml cp /tmp/clean_vless_users.py backend:/tmp/clean_vless_users.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY backend python /tmp/clean_vless_users.py 2>&1 || echo "  VLESS cleanup completed or skipped"
              rm -f /tmp/clean_vless_users.py

              echo "=== DATABASE + VLESS CLEANUP COMPLETE ==="
            fi
