name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_hardening:
        description: "Run post-deploy security hardening (migration, encrypt passwords, update .env)"
        required: false
        default: "false"
      run_cleanup:
        description: "Clean all user data and VLESS keys from database (destructive!)"
        required: false
        default: "false"
      reissue_keys:
        description: "Reissue VLESS keys for all users (clears xtls-rprx-vision flow on panels)"
        required: false
        default: "false"
      cleanup_duplicates:
        description: "Remove duplicate VLESS clients from 3x-ui panels (fix after botched reissue)"
        required: false
        default: "false"
      fix_lte:
        description: "Re-create VLESS clients on LTE servers (10, 12) only"
        required: false
        default: "false"
      run_diag:
        description: "Run LTE relay chain diagnostic script"
        required: false
        default: "false"
      lte_ssh:
        description: "SSH to LTE, dump xray config + test Frankfurt connectivity"
        required: false
        default: "false"
      fix_lte_relay:
        description: "Fix LTE relay outbound: remove xtls-rprx-vision flow"
        required: false
        default: "false"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Create deploy artifact (exclude non-runtime files)
        run: |
          mkdir -p bravada-deploy
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.codegraph' \
            --exclude='.claude' \
            --exclude='scripts/codegraph' \
            --exclude='node_modules' \
            --exclude='coverage' \
            --exclude='logs' \
            --exclude='tmp' \
            --exclude='temp' \
            --exclude='.cursor' \
            --exclude='.vscode' \
            --exclude='.idea' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='.ruff_cache' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/.next' \
            --exclude='*.log' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='bravada-deploy' \
            ./ bravada-deploy/

      - name: Package and upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "bravada-deploy"
          target: "/opt/bravada-release"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          RUN_HARDENING: ${{ github.event.inputs.run_hardening || 'false' }}
          RUN_CLEANUP: ${{ github.event.inputs.run_cleanup || 'false' }}
          REISSUE_KEYS: ${{ github.event.inputs.reissue_keys || 'false' }}
          CLEANUP_DUPLICATES: ${{ github.event.inputs.cleanup_duplicates || 'false' }}
          FIX_LTE: ${{ github.event.inputs.fix_lte || 'false' }}
          RUN_DIAG: ${{ github.event.inputs.run_diag || 'false' }}
          LTE_SSH: ${{ github.event.inputs.lte_ssh || 'false' }}
          FIX_LTE_RELAY: ${{ github.event.inputs.fix_lte_relay || 'false' }}
          LTE_SSH_KEY: ${{ secrets.LTE_SSH_KEY }}
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          envs: RUN_HARDENING,RUN_CLEANUP,REISSUE_KEYS,CLEANUP_DUPLICATES,FIX_LTE,RUN_DIAG,LTE_SSH,FIX_LTE_RELAY,LTE_SSH_KEY,FIELD_ENCRYPTION_KEY,INTERNAL_API_SECRET
          script: |
            set -e

            echo "=== Swapping deploy artifact into place ==="
            cd /opt/bravada

            # Preserve server-side files (never overwritten from repo)
            cp -p backend/.env /tmp/backend.env.backup 2>/dev/null || true
            cp -p .env /tmp/root.env.backup 2>/dev/null || true
            cp -rp ssl /tmp/ssl.backup 2>/dev/null || true

            # Replace app directory with clean artifact
            rm -rf /opt/bravada
            mv /opt/bravada-release /opt/bravada

            # Restore server-side files
            cp -p /tmp/backend.env.backup /opt/bravada/backend/.env 2>/dev/null || true
            cp -p /tmp/root.env.backup /opt/bravada/.env 2>/dev/null || true
            cp -a /tmp/ssl.backup/. /opt/bravada/ssl/ 2>/dev/null || true

            echo "=== Verifying excluded paths are absent ==="
            test ! -e /opt/bravada/.codegraph || { echo "FAIL: .codegraph/ exists on server"; exit 1; }
            test ! -e /opt/bravada/.claude || { echo "FAIL: .claude/ exists on server"; exit 1; }
            test ! -e /opt/bravada/scripts/codegraph || { echo "FAIL: scripts/codegraph/ exists on server"; exit 1; }
            echo "OK: excluded paths verified absent"

            echo "=== Building and starting containers ==="
            cd /opt/bravada
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate || docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
            echo "Deploy complete: $(date)"

            if [ "$RUN_HARDENING" = "true" ]; then
              echo "=== POST-DEPLOY HARDENING ==="

              echo "--- Step 1: Update .env ---"
              cd /opt/bravada/backend
              grep -q "^FIELD_ENCRYPTION_KEY=" .env || echo "FIELD_ENCRYPTION_KEY=" >> .env
              grep -q "^XUI_ENABLED=" .env || echo "XUI_ENABLED=0" >> .env
              grep -q "^XUI_VERIFY_SSL=" .env || echo "XUI_VERIFY_SSL=1" >> .env
              grep -q "^INTERNAL_API_SECRET=" .env || echo "INTERNAL_API_SECRET=" >> .env
              grep -q "^SUBSCRIPTION_BASE_URL=" .env || echo "SUBSCRIPTION_BASE_URL=https://bravada-connect.ru" >> .env

              sed -i "s|^FIELD_ENCRYPTION_KEY=.*|FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}|" .env
              sed -i "s|^XUI_ENABLED=.*|XUI_ENABLED=1|" .env
              sed -i "s|^XUI_VERIFY_SSL=.*|XUI_VERIFY_SSL=1|" .env
              sed -i "s|^INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=${INTERNAL_API_SECRET}|" .env
              sed -i "s|^SUBSCRIPTION_BASE_URL=.*|SUBSCRIPTION_BASE_URL=https://bravada-connect.ru|" .env
              echo "  .env updated"

              echo "--- Step 2: Run migrations ---"
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "ALTER TABLE vpn_servers ADD COLUMN IF NOT EXISTS encrypted_password TEXT NOT NULL DEFAULT '';" 2>&1 || echo "  Column already exists"
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "ALTER TABLE user_identities ADD COLUMN IF NOT EXISTS vless_uuid TEXT NULL;" 2>&1 || echo "  Column already exists"
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "CREATE UNIQUE INDEX IF NOT EXISTS idx_user_identities_vless_uuid ON user_identities (vless_uuid) WHERE vless_uuid IS NOT NULL;" 2>&1 || echo "  Index already exists"
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "CREATE UNIQUE INDEX IF NOT EXISTS uq_referral_tx_user_desc ON referral_transactions (internal_user_id, description);" 2>&1 || echo "  Index already exists"

              echo "--- Step 3: Encrypt panel passwords ---"
              cd /opt/bravada
              cat > /tmp/encrypt_passwords.py << 'PYEOF'
            import asyncio, asyncpg, os, sys
            sys.path.insert(0, '/app/src')
            from app.security.field_encryption import encrypt_field

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                conn = await asyncpg.connect(dsn)
                try:
                    rows = await conn.fetch("SELECT id, panel_password, COALESCE(encrypted_password, '') AS enc FROM vpn_servers")
                    if not rows:
                        print('No vpn_servers found.')
                        return
                    for row in rows:
                        sid = row['id']
                        enc = row['enc']
                        plain = row['panel_password']
                        if enc:
                            print(f'  server {sid}: already encrypted, skipping')
                            continue
                        if not plain:
                            print(f'  server {sid}: empty password, skipping')
                            continue
                        encrypted = encrypt_field(plain)
                        await conn.execute('UPDATE vpn_servers SET encrypted_password = $1 WHERE id = $2', encrypted, sid)
                        print(f'  server {sid}: encrypted')
                    print('Encryption done.')
                finally:
                    await conn.close()

            asyncio.run(main())
            PYEOF
              docker compose -f docker-compose.prod.yml cp /tmp/encrypt_passwords.py backend:/tmp/encrypt_passwords.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY backend python /tmp/encrypt_passwords.py 2>&1 || echo "  Encryption completed or skipped"
              rm -f /tmp/encrypt_passwords.py

              echo "--- Step 4: Restart with new env ---"
              docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
              sleep 10

              echo "--- Step 5: Verify ---"
              docker compose -f docker-compose.prod.yml ps
              sleep 5
              curl -sf http://127.0.0.1:8000/healthz && echo " - backend healthz OK" || echo " - backend healthz FAILED"
              curl -sf http://127.0.0.1:8000/readyz && echo " - backend readyz OK" || echo " - backend readyz FAILED (may need a moment)"
              echo ""
              echo "=== HARDENING COMPLETE ==="
            fi

            if [ "$RUN_CLEANUP" = "true" ]; then
              echo "=== DATABASE CLEANUP ==="
              cd /opt/bravada

              echo "--- Truncating all user data tables ---"
              docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
                "TRUNCATE TABLE
                  email_verification_codes,
                  user_emails,
                  referral_transactions,
                  referral_balances,
                  referral_relationships,
                  referral_codes,
                  notification_log,
                  access_reconcile_runs,
                  telegram_update_dedup,
                  adm02_ensure_access_audit_events,
                  issuance_state,
                  billing_subscription_apply_audit_events,
                  billing_subscription_apply_records,
                  billing_ingestion_audit_events,
                  billing_events_ledger,
                  slice1_uc01_outbound_deliveries,
                  idempotency_records,
                  slice1_audit_events,
                  subscription_snapshots,
                  user_identities
                CASCADE;" 2>&1

              echo "--- Deleting all VLESS users from 3x-ui panels ---"
              cd /opt/bravada
              cat > /tmp/clean_vless_users.py << 'PYEOF'
            import asyncio, asyncpg, os, sys, json
            sys.path.insert(0, '/app/src')
            from app.security.field_encryption import decrypt_field

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                conn = await asyncpg.connect(dsn)
                try:
                    rows = await conn.fetch(
                        "SELECT id, panel_url, panel_username, panel_password, "
                        "COALESCE(encrypted_password, '') AS encrypted_password, inbound_id "
                        "FROM vpn_servers WHERE is_active = TRUE"
                    )
                    if not rows:
                        print('No active VPN servers found.')
                        return
                    import httpx
                    for row in rows:
                        panel_url = row['panel_url'].rstrip('/')
                        password = row['encrypted_password'] if row['encrypted_password'] else row['panel_password']
                        if row['encrypted_password']:
                            password = decrypt_field(row['encrypted_password'])
                        inbound_id = row['inbound_id']
                        print(f'  Server {row["id"]}: {panel_url} (inbound {inbound_id})')

                        async with httpx.AsyncClient(verify=False, follow_redirects=True) as client:
                            login = await client.post(f'{panel_url}/login',
                                data={'username': row['panel_username'], 'password': password})
                            if login.status_code != 200 or not login.json().get('success'):
                                print(f'    Login FAILED')
                                continue
                            resp = await client.get(f'{panel_url}/panel/api/inbounds/list')
                            if resp.status_code != 200:
                                print(f'    List inbounds FAILED: {resp.status_code}')
                                continue
                            inbounds = resp.json().get('obj', [])
                            target = None
                            for ib in inbounds:
                                if ib.get('id') == inbound_id:
                                    target = ib
                                    break
                            if not target:
                                print(f'    Inbound {inbound_id} not found')
                                continue
                            settings_str = target.get('settings', '{}')
                            try:
                                settings = json.loads(settings_str)
                            except json.JSONDecodeError:
                                print(f'    Could not parse settings')
                                continue
                            clients = settings.get('clients', [])
                            if not clients:
                                print(f'    No VLESS users on this server.')
                                continue
                            print(f'    Found {len(clients)} VLESS users, deleting...')
                            for c in clients:
                                uuid = c.get('id', '')
                                email = c.get('email', '')
                                del_resp = await client.post(
                                    f'{panel_url}/panel/api/inbounds/{inbound_id}/delClient/{uuid}')
                                status = 'OK' if del_resp.status_code == 200 else f'FAIL({del_resp.status_code})'
                                print(f'      Deleted {email} ({uuid[:8]}...): {status}')
                    print('VLESS cleanup done.')
                finally:
                    await conn.close()

            asyncio.run(main())
            PYEOF
              docker compose -f docker-compose.prod.yml cp /tmp/clean_vless_users.py backend:/tmp/clean_vless_users.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY backend python /tmp/clean_vless_users.py 2>&1 || echo "  VLESS cleanup completed or skipped"
              rm -f /tmp/clean_vless_users.py

              echo "=== DATABASE + VLESS CLEANUP COMPLETE ==="
            fi

            if [ "$REISSUE_KEYS" = "true" ]; then
              echo "=== REISSUE ALL VLESS KEYS ==="
              cd /opt/bravada
              cat > /tmp/reissue_all_keys.py << 'PYEOF'
            import asyncio, asyncpg, os, sys
            sys.path.insert(0, '/app/src')

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                pool = await asyncpg.create_pool(dsn, min_size=1, max_size=3)
                try:
                    rows = await pool.fetch(
                        "SELECT internal_user_id FROM user_identities WHERE vless_uuid IS NOT NULL"
                    )
                    user_ids = [r['internal_user_id'] for r in rows]
                    print(f"Found {len(user_ids)} users with VLESS keys")

                    from app.issuance.xui_vless_provider import XuiVlessProvider
                    from app.issuance.vless_provider import VlessProviderOutcome
                    provider = XuiVlessProvider(pool)

                    success = 0
                    failed = 0
                    for i, uid in enumerate(user_ids, 1):
                        try:
                            # 1. Clear stored UUID so reissue generates fresh one
                            await pool.execute(
                                "UPDATE user_identities SET vless_uuid = NULL WHERE internal_user_id = $1", uid)
                            # 2. Revoke (disable) old keys on all panels
                            await provider.revoke_user(internal_user_id=uid)
                            # 3. Create fresh keys with flow="" (no xtls-rprx-vision)
                            result = await provider.create_user(internal_user_id=uid)
                            if result.outcome == VlessProviderOutcome.SUCCESS and result.config:
                                srv = len(result.config.servers)
                                print(f"  [{i}/{len(user_ids)}] {uid[:16]}... -> ok ({srv} servers)")
                                success += 1
                            else:
                                print(f"  [{i}/{len(user_ids)}] {uid[:16]}... -> FAILED: {result.outcome}")
                                failed += 1
                        except Exception as exc:
                            print(f"  [{i}/{len(user_ids)}] {uid[:16]}... -> ERROR: {type(exc).__name__}")
                            failed += 1

                    print(f"\nDone: {success} reissued, {failed} failed out of {len(user_ids)} users")
                finally:
                    await pool.close()

            asyncio.run(main())
            PYEOF
              docker compose -f docker-compose.prod.yml cp /tmp/reissue_all_keys.py backend:/tmp/reissue_all_keys.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/reissue_all_keys.py 2>&1
              rm -f /tmp/reissue_all_keys.py
              echo "=== REISSUE COMPLETE ==="
            fi

            if [ "$CLEANUP_DUPLICATES" = "true" ]; then
              echo "=== CLEANUP DUPLICATE VLESS CLIENTS ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/cleanup_duplicate_clients.py backend:/tmp/cleanup_duplicate_clients.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/cleanup_duplicate_clients.py 2>&1
              rm -f /tmp/cleanup_duplicate_clients.py

              echo "--- Restarting xray on all panels ---"
              cat > /tmp/restart_xray.py << 'PYEOF'
            import asyncio, asyncpg, os, sys, json
            sys.path.insert(0, '/app/src')
            from app.security.field_encryption import decrypt_field

            async def main():
                dsn = os.environ.get('DATABASE_URL', '')
                if not dsn:
                    print('ERROR: DATABASE_URL not set')
                    return
                pool = await asyncpg.create_pool(dsn, min_size=1, max_size=3)
                try:
                    rows = await pool.fetch(
                        "SELECT id, label, panel_url, panel_username, panel_password, "
                        "COALESCE(encrypted_password, '') AS encrypted_password "
                        "FROM vpn_servers WHERE is_active = TRUE ORDER BY id"
                    )
                    import httpx
                    for row in rows:
                        panel_url = row['panel_url'].rstrip('/')
                        password = row['encrypted_password'] if row['encrypted_password'] else row['panel_password']
                        if row['encrypted_password']:
                            password = decrypt_field(row['encrypted_password'])
                        print(f'  Server {row["id"]}: {row["label"]}')
                        async with httpx.AsyncClient(verify=False, follow_redirects=True, timeout=10) as client:
                            import re
                            page = await client.get(f'{panel_url}/')
                            csrf = None
                            m = re.search(r'csrf-token" content="([^"]+)"', page.text)
                            if m:
                                csrf = m.group(1)
                            headers = {"Content-Type": "application/json"}
                            if csrf:
                                headers["X-CSRF-Token"] = csrf
                            login = await client.post(f'{panel_url}/login',
                                json={"username": row['panel_username'], "password": password}, headers=headers)
                            if login.status_code != 200 or not login.json().get('success'):
                                print(f'    Login FAILED')
                                continue
                            resp = await client.post(f'{panel_url}/panel/api/setting/restartXrayService', headers=headers)
                            ok = 'OK' if resp.status_code == 200 else f'FAIL({resp.status_code})'
                            print(f'    Restart xray: {ok}')
                finally:
                    await pool.close()

            asyncio.run(main())
            PYEOF
              docker compose -f docker-compose.prod.yml cp /tmp/restart_xray.py backend:/tmp/restart_xray.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/restart_xray.py 2>&1
              rm -f /tmp/restart_xray.py
              echo "=== CLEANUP COMPLETE ==="
            fi

            if [ "$FIX_LTE" = "true" ]; then
              echo "=== FIX LTE SERVERS (10, 12) ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/fix_lte_servers.py backend:/tmp/fix_lte_servers.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/fix_lte_servers.py 2>&1
              rm -f /tmp/fix_lte_servers.py
              echo "=== FIX LTE COMPLETE ==="
            fi

            if [ "$RUN_DIAG" = "true" ]; then
              echo "=== LTE RELAY CHAIN DIAGNOSTIC ==="
              cd /opt/bravada
              docker compose -f docker-compose.prod.yml cp backend/scripts/diagnose_lte.py backend:/tmp/diagnose_lte.py 2>/dev/null || true
              docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/diagnose_lte.py 2>&1
              rm -f /tmp/diagnose_lte.py
              echo "=== DIAG COMPLETE ==="
            fi

            if [ "$LTE_SSH" = "true" ]; then
              echo "=== LTE SSH DIAGNOSTIC ==="
              LTE="46.21.246.115"
              mkdir -p ~/.ssh
              printf '%s\n' "$LTE_SSH_KEY" > ~/.ssh/yandex-cloud
              chmod 600 ~/.ssh/yandex-cloud
              echo "--- xray config.json ---"
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} "cat /usr/local/x-ui/bin/config.json" 2>&1
              echo ""
              echo "--- Frankfurt connectivity from LTE ---"
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} "for p in 443 2053 8443 10000; do timeout 3 bash -c \"echo > /dev/tcp/77.110.100.210/\$p\" 2>/dev/null && echo \"Frankfurt:\$p REACHABLE\" || echo \"Frankfurt:\$p UNREACHABLE\"; done" 2>&1
              rm -f ~/.ssh/yandex-cloud
              echo "=== LTE SSH DIAG COMPLETE ==="
            fi

            if [ "$FIX_LTE_RELAY" = "true" ]; then
              echo "=== FIX LTE RELAY: remove xtls-rprx-vision flow ==="
              LTE="46.21.246.115"
              mkdir -p ~/.ssh
              printf '%s\n' "$LTE_SSH_KEY" > ~/.ssh/yandex-cloud
              chmod 600 ~/.ssh/yandex-cloud
              echo "--- Before fix ---"
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} "python3 -c \"import json; c=json.load(open('/usr/local/x-ui/bin/config.json')); ob=[o for o in c.get('outbounds',[]) if o.get('tag')=='relay-to-frankfurt']; print(json.dumps(ob,indent=2)) if ob else print('NOT FOUND')\"" 2>&1
              echo "--- Applying fix ---"
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} "python3 -c \"
import json
with open('/usr/local/x-ui/bin/config.json') as f:
    c = json.load(f)
for o in c.get('outbounds', []):
    if o.get('tag') == 'relay-to-frankfurt':
        for u in o.get('settings',{}).get('vnext',[{}]):
            for user in u.get('users',[]):
                if user.get('flow') == 'xtls-rprx-vision':
                    user['flow'] = ''
                    print('FIXED: removed xtls-rprx-vision flow')
                else:
                    print(f'flow already empty: {repr(user.get(\"flow\"))}')
with open('/usr/local/x-ui/bin/config.json','w') as f:
    json.dump(c, f, indent=2)
\"" 2>&1
              echo "--- Restarting xray ---"
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} "sudo systemctl restart x-ui 2>/dev/null || (x-ui restart 2>/dev/null && echo 'restarted via x-ui') || echo 'trying pkill'; sleep 2; ps aux | grep xray | grep -v grep | head -1" 2>&1
              echo "--- After fix ---"
              ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} "python3 -c \"import json; c=json.load(open('/usr/local/x-ui/bin/config.json')); ob=[o for o in c.get('outbounds',[]) if o.get('tag')=='relay-to-frankfurt']; print(json.dumps(ob,indent=2)) if ob else print('NOT FOUND')\"" 2>&1
              rm -f ~/.ssh/yandex-cloud
              echo "=== FIX LTE RELAY COMPLETE ==="
            fi
