                                else:
                                    print(f'    LOGIN FAILED: status={login.status_code} body={login.text[:200]}')
                        except Exception as e:
                            print(f'    ERROR: {e}')
                finally:
                    await pool.close()

            asyncio.run(main())
            PYEOF
            docker compose -f docker-compose.prod.yml cp /tmp/panel_diag.py backend:/tmp/panel_diag.py 2>/dev/null || true
            docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY -e DATABASE_URL backend python /tmp/panel_diag.py 2>&1 || echo "  Panel diagnostic failed"
