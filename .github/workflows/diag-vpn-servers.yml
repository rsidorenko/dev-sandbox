name: diag-vpn-servers
on:
  workflow_dispatch:

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sshpass
        run: sudo apt-get install -y sshpass >/dev/null 2>&1

      - name: Query vpn_servers from production DB
        env:
          SERVER_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SERVER_KEY" > ~/.ssh/server-key; chmod 600 ~/.ssh/server-key
          echo "=== vpn_servers table (production) ==="
          scp -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/server-key backend/scripts/check_vpn_servers.py root@109.120.178.49:/tmp/check_vpn.py 2>&1
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/server-key root@109.120.178.49 "
            cd /opt/bravada/backend && source .env
            CONTAINER=\$(docker ps --format '{{.Names}}' | grep -i 'bravada\|backend\|bot' | head -1)
            echo 'Container:' \$CONTAINER
            if [ -n \"\$CONTAINER\" ]; then
              docker exec \$CONTAINER python3 /tmp/check_vpn.py 2>&1
            else
              echo 'No matching container found'
              docker ps --format '{{.Names}} {{.Image}}'
            fi
            rm -f /tmp/check_vpn.py
          " 2>&1 || echo "SSH FAILED"

      - name: Check bot logs for resolve errors
        env:
          SERVER_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/server-key root@109.120.178.49 "
            CONTAINER=\$(docker ps --format '{{.Names}}' | grep -i 'bravada\|backend\|bot' | head -1)
            if [ -n \"\$CONTAINER\" ]; then
              echo '=== Bot container logs (last 100 lines) ==='
              docker logs --tail 100 \$CONTAINER 2>&1 | grep -i 'resolve\|exception\|NOT_FOUND\|UNAVAIL\|csrf\|login\|401\|403\|error\|failed\|v3_mode\|getClientTraffics\|subscription\|server.*skip\|uuid.*None' | tail -30
            fi
          " 2>&1 || echo "SSH FAILED"
