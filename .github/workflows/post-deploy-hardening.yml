name: post-deploy-hardening

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'EXECUTE' to run post-deploy hardening steps"
        required: true

jobs:
  harden:
    name: Post-deploy security hardening
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event.inputs.confirm == 'EXECUTE' }}
    steps:
      - name: Run post-deploy hardening via SSH
        uses: appleboy/ssh-action@v1
        env:
          FIELD_ENCRYPTION_KEY: ${{ secrets.FIELD_ENCRYPTION_KEY }}
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: FIELD_ENCRYPTION_KEY,INTERNAL_API_SECRET
          script: |
            set -e
            cd /opt/bravada

            echo "=== Step 1: Update .env with new variables ==="
            cd backend

            # Add new env vars if not present
            grep -q "^FIELD_ENCRYPTION_KEY=" .env || echo "FIELD_ENCRYPTION_KEY=" >> .env
            grep -q "^XUI_ENABLED=" .env || echo "XUI_ENABLED=0" >> .env
            grep -q "^XUI_VERIFY_SSL=" .env || echo "XUI_VERIFY_SSL=1" >> .env
            grep -q "^INTERNAL_API_SECRET=" .env || echo "INTERNAL_API_SECRET=" >> .env
            grep -q "^SUBSCRIPTION_BASE_URL=" .env || echo "SUBSCRIPTION_BASE_URL=https://bravada-connect.ru" >> .env

            # Set values
            sed -i "s|^FIELD_ENCRYPTION_KEY=.*|FIELD_ENCRYPTION_KEY=${FIELD_ENCRYPTION_KEY}|" .env
            sed -i "s|^XUI_ENABLED=.*|XUI_ENABLED=1|" .env
            sed -i "s|^XUI_VERIFY_SSL=.*|XUI_VERIFY_SSL=1|" .env
            sed -i "s|^INTERNAL_API_SECRET=.*|INTERNAL_API_SECRET=${INTERNAL_API_SECRET}|" .env
            sed -i "s|^SUBSCRIPTION_BASE_URL=.*|SUBSCRIPTION_BASE_URL=https://bravada-connect.ru|" .env

            echo "  .env updated (values redacted)"

            echo "=== Step 2: Run migration 029 ==="
            cd /opt/bravada

            # Run migration directly in postgres container
            docker compose -f docker-compose.prod.yml exec -T postgres psql -U vpnbot -d vpnbot -c \
              "ALTER TABLE vpn_servers ADD COLUMN IF NOT EXISTS encrypted_password TEXT NOT NULL DEFAULT '';" 2>&1 || echo "  Migration already applied or column exists"

            echo "=== Step 3: Encrypt panel passwords ==="
            cd /opt/bravada
            docker compose -f docker-compose.prod.yml exec -T -e FIELD_ENCRYPTION_KEY backend python scripts/encrypt_panel_passwords.py 2>&1 || echo "  Encryption script ran (check output above)"

            echo "=== Step 4: Restart services with new env ==="
            cd /opt/bravada
            docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate
            sleep 5

            echo "=== Step 5: Verify services ==="
            docker compose -f docker-compose.prod.yml ps
            echo ""

            # Health check
            sleep 3
            curl -sf http://127.0.0.1:8000/healthz && echo " - backend OK" || echo " - backend FAILED"
            curl -sf http://127.0.0.1:8000/readyz && echo " - backend ready" || echo " - backend not ready (may need a moment)"

            echo ""
            echo "=== Post-deploy hardening COMPLETE ==="
            echo "WARNING: Verify .env does not contain plaintext secrets by running: grep -v '^#' backend/.env | grep -v '^$'"
