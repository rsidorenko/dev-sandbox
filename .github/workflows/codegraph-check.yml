name: codegraph-check

on:
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - ".codegraph/**"
      - ".github/workflows/codegraph-check.yml"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".codegraph/**"
      - ".github/workflows/codegraph-check.yml"

concurrency:
  group: codegraph-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: CodeGraph index validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install CodeGraph
        run: npm i -g @colbymchenry/codegraph

      - name: Initialize CodeGraph index
        run: codegraph init -i

      - name: Verify index is healthy
        run: |
          codegraph status
          FILE_COUNT=$(codegraph files --json | node -e "
            const chunks = [];
            process.stdin.on('data', c => chunks.push(c));
            process.stdin.on('end', () => {
              const files = JSON.parse(Buffer.concat(chunks).toString());
              console.log(files.length);
            });
          ")
          echo "Indexed $FILE_COUNT files"
          if [ "$FILE_COUNT" -lt 100 ]; then
            echo "FAIL: CodeGraph indexed fewer than 100 files — expected 400+"
            exit 1
          fi
          echo "OK: CodeGraph index looks healthy ($FILE_COUNT files)"
