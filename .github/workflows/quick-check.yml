name: quick-check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            LTE="46.21.246.115"
            mkdir -p ~/.ssh
            echo '' | base64 -d > ~/.ssh/yandex-cloud
            chmod 600 ~/.ssh/yandex-cloud

            echo "=== SSH to LTE: restart xray ==="
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/yandex-cloud romtan@${LTE} 'echo "Before restart:"; ps aux | grep xray | grep -v grep | head -1; echo ""; echo "Restarting x-ui..."; cd /usr/local/x-ui && sudo ./x-ui restart 2>&1; sleep 3; echo ""; echo "After restart:"; ps aux | grep xray | grep -v grep | head -1; echo ""; echo "Ports:"; ss -tlnp | grep -E "443|80"; echo ""; echo "Test connection to Frankfurt:"; curl -sk --connect-timeout 5 https://77.110.100.210:443/ -w "HTTP %{http_code}" -o /dev/null 2>&1 || echo "FAILED"' 2>&1 || echo "SSH FAILED"

            rm -f ~/.ssh/yandex-cloud
