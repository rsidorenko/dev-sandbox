name: quick-check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            LTE="46.21.246.115"
            mkdir -p ~/.ssh
            echo "-----BEGIN OPENSSH PRIVATE KEY-----" > ~/.ssh/yandex-cloud
            echo "b3BlbnNzaC1rZXktdjEAAAAABG5vbmUAAAAEbm9uZQAAAAAAAAABAAAAMwAAAAtzc2gtZW" >> ~/.ssh/yandex-cloud
            echo "QyNTUxOQAAACDYIM6usWID3FIhVNTlpah90DdT67qlISrPF96f9qFSxgAAAJCTOutRkzrr" >> ~/.ssh/yandex-cloud
            echo "UQAAAAtzc2gtZWQyNTUxOQAAACDYIM6usWID3FIhVNTlpah90DdT67qlISrPF96f9qFSxg" >> ~/.ssh/yandex-cloud
            echo "AAAEBBPnEC+BRn5zcZZU7d1WRFCRI/afXjF48eUU4XakJezNggzq6xYgPcUiFU1OWlqH3Q" >> ~/.ssh/yandex-cloud
            echo "N1PruqUhKs8X3p/2oVLGAAAADHlhbmRleC1jbG91ZAE=" >> ~/.ssh/yandex-cloud
            echo "-----END OPENSSH PRIVATE KEY-----" >> ~/.ssh/yandex-cloud
            chmod 600 ~/.ssh/yandex-cloud

            echo "=== LTE full xray config (outbound + routing details) ==="
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} 'python3 -c "
import json
c = json.load(open(\"/usr/local/x-ui/bin/config.json\"))

# Full outbounds details
print(\"=== OUTBOUNDS ===\")
for o in c.get(\"outbounds\", []):
    print(json.dumps(o, indent=2))

# Full routing rules
print(\"\\n=== ROUTING ===\")
r = c.get(\"routing\", {})
print(json.dumps(r, indent=2))

# Inbounds summary
print(\"\\n=== INBOUNDS ===\")
for ib in c.get(\"inbounds\", []):
    s = ib.get(\"settings\", \"{}\")
    if isinstance(s, str):
        s = json.loads(s)
    stream = ib.get(\"streamSettings\", {})
    print(f\"port={ib.get(\"port\")} proto={ib.get(\"protocol\")} net={stream.get(\"network\",\"?\")} sec={stream.get(\"security\",\"?\")} listen={ib.get(\"listen\",\"\")}\")
    if \"realitySettings\" in stream:
        rs = stream[\"realitySettings\"]
        print(f\"  reality: dest={rs.get(\"dest\")} clients={len(s.get(\"clients\",[]))}\")
"' 2>&1

            echo ""
            echo "=== Check Frankfurt port (relay target) ==="
            # Check if Frankfurt 77.110.100.210 port 443 is reachable from LTE
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 -i ~/.ssh/yandex-cloud romtan@${LTE} 'echo "Testing connection to Frankfurt..."; timeout 5 bash -c "echo > /dev/tcp/77.110.100.210/443" 2>&1 && echo "Frankfurt:443 REACHABLE" || echo "Frankfurt:443 UNREACHABLE"; echo "Testing 2053..."; timeout 5 bash -c "echo > /dev/tcp/77.110.100.210/2053" 2>&1 && echo "Frankfurt:2053 REACHABLE" || echo "Frankfurt:2053 UNREACHABLE"; echo "Testing 8443..."; timeout 5 bash -c "echo > /dev/tcp/77.110.100.210/8443" 2>&1 && echo "Frankfurt:8443 REACHABLE" || echo "Frankfurt:8443 UNREACHABLE"' 2>&1

            rm -f ~/.ssh/yandex-cloud
