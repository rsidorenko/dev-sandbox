name: quick-check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            echo "=== Check LTE VPN ports from production ==="
            LTE_HOST="46.21.246.115"
            echo "Port 443 (TCP Reality):"
            curl -sk --connect-timeout 5 "https://${LTE_HOST}:443/" -w "HTTP %{http_code}" -o /dev/null 2>&1 || echo "CONNECT FAILED"
            echo ""
            echo "Port 80 (WS CDN):"
            curl -s --connect-timeout 5 "http://${LTE_HOST}:80/" -w "HTTP %{http_code}" -o /dev/null 2>&1 || echo "CONNECT FAILED"
            echo ""
            echo "Panel:"
            curl -sk --connect-timeout 5 "https://${LTE_HOST}:54023/Cq6xxAccNLaSEBcR0L/" -w "HTTP %{http_code}" -o /dev/null 2>&1 || echo "CONNECT FAILED"
            echo ""
            
            echo "=== SSH to LTE and check xray ==="
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 -i ~/.ssh/yandex-relay romtan@${LTE_HOST} "
              echo 'xray process:'
              ps aux | grep xray | grep -v grep || echo '  NOT RUNNING!'
              echo ''
              echo 'xray config outbound:'
              cat /usr/local/x-ui/bin/config.json 2>/dev/null | python3 -c \"import sys,json; c=json.load(sys.stdin); [print(f'  {o.get(\\\"tag\\\",\\\"?\\\")}: {o.get(\\\"protocol\\\",\\\"?\\\")} -> {o.get(\\\"settings\\\",{}).get(\\\"vnext\\\",[{}])[0].get(\\\"address\\\",\\\"?\\\")}') for o in c.get('outbounds',[])]\" 2>/dev/null || echo '  Could not parse config'
              echo ''
              echo 'Listening ports:'
              ss -tlnp | grep -E '443|80' || echo '  No VPN ports listening!'
            " 2>&1 || echo "SSH to LTE FAILED"
