name: quick-check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            LTE="46.21.246.115"
            mkdir -p ~/.ssh
            printf '-----BEGIN OPENSSH PRIVATE KEY-----\\n-----END OPENSSH PRIVATE KEY-----\n' > ~/.ssh/yandex-cloud
            chmod 600 ~/.ssh/yandex-cloud

            echo "=== SSH to LTE ==="
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/yandex-cloud romtan@${LTE} 'echo "=== Xray process ==="; ps aux | grep -E "xray" | grep -v grep; echo ""; echo "=== Outbounds ==="; python3 -c "import json; c=json.load(open(\"/usr/local/x-ui/bin/config.json\")); [print(f\"  {o.get(chr(116)+chr(97)+chr(103),chr(63))}: {o.get(chr(112)+chr(114)+chr(111)+chr(116)+chr(111)+chr(99)+chr(111)+chr(108),chr(63))} -> {o.get(chr(115)+chr(101)+chr(116)+chr(116)+chr(105)+chr(110)+chr(103)+chr(115),{}).get(chr(118)+chr(110)+chr(101)+chr(120)+chr(116),[{}])[0].get(chr(97)+chr(100)+chr(100)+chr(114)+chr(101)+chr(115)+chr(115),chr(63))}\") for o in c.get(\"outbounds\",[])]" 2>/dev/null; echo ""; echo "=== Routing ==="; python3 -c "import json; c=json.load(open(\"/usr/local/x-ui/bin/config.json\")); [print(f\"  {r.get(chr(116)+chr(121)+chr(112)+chr(101),chr(63))} -> {r.get(chr(111)+chr(117)+chr(116)+chr(98)+chr(111)+chr(117)+chr(110)+chr(100)+chr(84)+chr(97)+chr(103),chr(63))} domains={r.get(chr(100)+chr(111)+chr(109)+chr(97)+chr(105)+chr(110),[])[:3]}\") for r in c.get(\"routing\",{}).get(\"rules\",[])[:8]]" 2>/dev/null; echo ""; echo "=== Ports ==="; ss -tlnp | grep -E "443|80"; echo ""; echo "=== Restart xray ==="; x-ui restart 2>/dev/null || systemctl restart x-ui 2>/dev/null || echo "no restart cmd"; sleep 2; ps aux | grep xray | grep -v grep | head -2' 2>&1 || echo "SSH FAILED"

            rm -f ~/.ssh/yandex-cloud
