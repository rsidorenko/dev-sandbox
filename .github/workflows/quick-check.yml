name: quick-check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            LTE="46.21.246.115"
            mkdir -p ~/.ssh
            echo '' | base64 -d > ~/.ssh/yandex-cloud
            chmod 600 ~/.ssh/yandex-cloud

            echo "=== SSH to LTE: kill xray to force restart ==="
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/yandex-cloud romtan@${LTE} 'OLD=$(pgrep -f xray-linux); echo "Old PID: $OLD"; kill $OLD 2>/dev/null; echo "Sent SIGTERM"; sleep 5; NEW=$(pgrep -f xray-linux); echo "New PID: $NEW"; if [ "$NEW" = "$OLD" ]; then echo "WARNING: same PID - process did not restart"; elif [ -z "$NEW" ]; then echo "ERROR: xray not running!"; else echo "OK: xray restarted"; fi; echo "Ports:"; ss -tlnp | grep -E "443|80"' 2>&1 || echo "SSH FAILED"

            rm -f ~/.ssh/yandex-cloud
