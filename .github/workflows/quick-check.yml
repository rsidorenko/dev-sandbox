name: quick-check
on:
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 10m
          script: |
            LTE="46.21.246.115"
            mkdir -p ~/.ssh
            echo '' | base64 -d > ~/.ssh/yandex-cloud
            chmod 600 ~/.ssh/yandex-cloud

            echo "=== SSH to LTE: find xray restart method ==="
            ssh -o StrictHostKeyChecking=no -i ~/.ssh/yandex-cloud romtan@${LTE} 'echo "xray owner:"; ps aux | grep xray-linux | grep -v grep | awk "{print \$1}"; echo ""; echo "x-ui service:"; systemctl status x-ui 2>&1 | head -3 || service x-ui status 2>&1 | head -3 || echo "no systemctl/service"; echo ""; echo "x-ui binary:"; ls -la /usr/local/x-ui/x-ui 2>/dev/null || echo "no x-ui binary"; echo ""; echo "whoami:"; whoami; echo ""; echo "sudo test:"; sudo -n true 2>&1 && echo "sudo OK" || echo "no passwordless sudo"' 2>&1 || echo "SSH FAILED"

            rm -f ~/.ssh/yandex-cloud
