name: reachability-test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: |
          test_endpoints() {
            # host port sni label
            echo "=== $4 ($1:$2, sni=$3) ==="
            timeout 8 bash -c "echo > /dev/tcp/$1/$2" 2>/dev/null && echo "  TCP: REACHABLE" || echo "  TCP: UNREACHABLE ❌"
            timeout 10 openssl s_client -connect "$1:$2" -servername "$3" </dev/null 2>&1 | grep -E "subject=|verify return code|Cipher" | head -2 || echo "  TLS: no handshake"
            echo ""
          }
          test_endpoints 77.221.159.106 443 vk.com "Helsinki 1.0"
          test_endpoints fi.techno-channel.ru 443 fi.techno-channel.ru "Helsinki 2.0 CDN"
          test_endpoints 77.221.159.106 8443 vk.com "Helsinki 3.0 xhttp"
          test_endpoints 77.110.100.210 443 vk.com "Frankfurt 1.0"
          test_endpoints de.techno-channel.online 443 de.techno-channel.online "Frankfurt 2.0 CDN"
          test_endpoints 77.110.100.210 8443 vk.com "Frankfurt 3.0 xhttp"
          test_endpoints 216.227.169.120 443 vk.com "LA 1.0"
          test_endpoints 216.227.169.120 8443 vk.com "LA 3.0 xhttp"
          test_endpoints 93.77.188.217 443 vk.com "LTE"
      - name: Discover webBasePath on Frankfurt + LA panels
        env:
          FRANKFURT_PASS: ${{ secrets.FRANKFURT_SSH_PASS }}
          LA_KEY: ${{ secrets.LA_SSH_KEY }}
          SERVER_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          sudo apt-get install -y sshpass >/dev/null 2>&1

          echo "=== Frankfurt webBasePath ==="
          sshpass -p "$FRANKFURT_PASS" ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 root@77.110.100.210 "python3 -c \"
import sqlite3
db=sqlite3.connect('/etc/x-ui/x-ui.db')
c=db.cursor()
c.execute('SELECT value FROM settings WHERE key=chr(119)+chr(101)+chr(98)+chr(66)+chr(97)+chr(115)+chr(101)+chr(80)+chr(97)+chr(116)+chr(104)')
r=c.fetchone()
print('webBasePath='+str(r[0]) if r else 'webBasePath=MISSING')
c.execute('SELECT value FROM settings WHERE key=chr(119)+chr(101)+chr(98)+chr(80)+chr(111)+chr(114)+chr(116)')
r2=c.fetchone()
print('webPort='+str(r2[0]) if r2 else 'webPort=MISSING')
db.close()
\"" 2>&1

          echo "=== LA webBasePath ==="
          mkdir -p ~/.ssh && printf '%s\n' "$LA_KEY" > ~/.ssh/la-key && chmod 600 ~/.ssh/la-key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/la-key romtan@216.227.169.120 "sudo python3 -c \"
import sqlite3
db=sqlite3.connect('/etc/x-ui/x-ui.db')
c=db.cursor()
c.execute('SELECT value FROM settings WHERE key=chr(119)+chr(101)+chr(98)+chr(66)+chr(97)+chr(115)+chr(101)+chr(80)+chr(97)+chr(116)+chr(104)')
r=c.fetchone()
print('webBasePath='+str(r[0]) if r else 'webBasePath=MISSING')
c.execute('SELECT value FROM settings WHERE key=chr(119)+chr(101)+chr(98)+chr(80)+chr(111)+chr(114)+chr(116)')
r2=c.fetchone()
print('webPort='+str(r2[0]) if r2 else 'webPort=MISSING')
db.close()
\"" 2>&1

          echo "=== Production panel_url from DB ==="
          mkdir -p ~/.ssh && printf '%s\n' "$SERVER_KEY" > ~/.ssh/server-key && chmod 600 ~/.ssh/server-key
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i ~/.ssh/server-key root@109.120.178.49 "
            BACKEND=\$(docker ps --format '{{.Names}}' | grep backend | head -1)
            echo \"Backend: \$BACKEND\"
            docker exec \$BACKEND python3 -c '
import asyncio,asyncpg,os
async def m():
 p=await asyncpg.create_pool(os.environ[\"DATABASE_URL\"])
 r=await p.fetch(\"SELECT id, label, panel_url, is_active FROM vpn_servers WHERE is_active=TRUE ORDER BY id\")
 for x in r: print(\"  id=%s label=%s url=%s\" % (x[\"id\"],x[\"label\"],x[\"panel_url\"]))
 await p.close()
asyncio.run(m())' 2>&1
          " 2>&1 || echo "SSH FAILED"
